name: mobilefacenet

model:
  backbone: mobilefacenet
  embedding_dim: 128            # MobileFaceNet original is 128-D
  pretrained: scratch           # train from scratch (small enough)

loss:
  type: arcface
  margin: 0.5
  scale: 32.0                   # smaller scale because embedding dim is smaller
  easy_margin: false

data:
  train_dataset: casia
  image_size: 112
  rgb: true
  mean: [0.5, 0.5, 0.5]
  std:  [0.5, 0.5, 0.5]
  augment:
    horizontal_flip: 0.5
    color_jitter: { brightness: 0.2, contrast: 0.2, saturation: 0.1 }
    blur: 0.1
    rotation: 5

train:
  epochs: 30
  batch_size: 256
  num_workers: 4
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 4e-5
  scheduler: cosine
  warmup_epochs: 1
  log_interval: 50
  ckpt_dir: weights/mobilefacenet

finetune:
  stage1:
    epochs: 5
    lr: 1e-3
    freeze_backbone: true
  stage2:
    epochs: 20
    lr: 1e-4
    freeze_backbone: false
    unfreeze_last_n_blocks: 2
  scheduler: cosine
  weight_decay: 4e-5
  batch_size: 128

eval:
  benchmark: lfw
  metrics: [accuracy, tar_at_far, roc_auc, eer]
